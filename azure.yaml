# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: album-viewer
metadata:
  template: album-viewer-swa@1.0.0

infra:
  provider: bicep
  path: IaC
  module: main

hooks:
  postprovision:
    posix:
      shell: sh
      run: echo "Waiting for resource indexing..."; sleep 30
      continueOnError: false
    windows:
      shell: pwsh
      run: Write-Host "Waiting for resource indexing..."; Start-Sleep -Seconds 30
      continueOnError: false

services:
  web:
    project: SamplesAndTest/album-viewer
    language: ts
    host: staticwebapp
    dist: dist
